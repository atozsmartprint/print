<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A To Z Solution - Smart Print Kiosk</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        :root { --primary: #4F46E5; --success: #10B981; --danger: #EF4444; --bg-color: #F3F4F6; --card-bg: #FFFFFF; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: linear-gradient(135deg, var(--primary), #8B5CF6); color: white; padding: 20px 0; text-align: center; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 25px; text-align: center; border-top: 4px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-upload { border: 2px dashed var(--primary); color: var(--primary); background: #EEF2FF; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .upload-wrapper { position: relative; display: inline-block; width: 100%; }
        .upload-wrapper input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%; }
        .btn-pay { background: var(--success); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 95%; max-width: 500px; text-align: center; }
        .crop-container { max-height: 50vh; overflow: hidden; margin-bottom: 15px; background: #eee; }
        .crop-container img { max-width: 100%; display: block; }
    </style>
</head>
<body>
    <header><h1><i class="fa-solid fa-print"></i> A To Z Solution</h1></header>
    <div class="container">
        <!-- Content Cards -->
        <div class="card">
            <h2>Document Print</h2>
            <div class="upload-wrapper">
                <button class="btn-upload">Select File</button>
                <input type="file" accept=".pdf, .docx, .doc" onchange="handleDocUpload(this)" />
            </div>
            <button id="doc-pay" class="btn-pay" disabled onclick="openPayment('DOC', document.getElementById('doc-total').innerText, 'doc')">Pay & Print</button>
        </div>
        <!-- ID Card and Photo cards similar structure -->
    </div>
    
    <!-- Payment Modal -->
    <div id="payment-modal" class="modal-overlay">
        <div class="modal-content">
            <img src="qr.jpg" alt="QR" style="width: 200px;">
            <input type="text" id="utr-input" autocomplete="off" placeholder="Enter 12-digit UTR" maxlength="12">
            <button class="btn-pay" onclick="processPayment()">Verify & Print</button>
        </div>
    </div>

    <script>
        function processPayment() {
            const utr = document.getElementById('utr-input').value;
            if(utr.length !== 12) return alert("Enter 12 digits!");
            const currentYearDigit = new Date().getFullYear().toString().slice(-1);
            if (utr.charAt(0) !== currentYearDigit) return alert("Invalid UTR format!");
            
            executeOrder(utr);
        }
        // ... (Remaining JS functions same as discussed)
    </script>
</body>
</html>
